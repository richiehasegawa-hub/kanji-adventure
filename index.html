<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ものがたり漢字アドベンチャー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #3A6EA8;
  --blue-light: #EBF3FB;
  --blue-dark: #1A4A7A;
  --orange: #F5A623;
  --gray-1: #F5F5F5;
  --gray-2: #E0E0E0;
  --gray-3: #9E9E9E;
  --text: #2D2D2D;
  --white: #FFFFFF;
  --shadow: 0 2px 12px rgba(0,0,0,.12);
  --radius: 16px;
}
html, body { height: 100%; width: 100%; font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', 'Yu Gothic', sans-serif; font-size: 18px; color: var(--text); background: var(--gray-1); overflow-x: hidden; font-weight: 600; }
button { cursor: pointer; border: none; font-family: inherit; font-weight: 600; }
input { font-family: inherit; font-weight: 600; }
#app { min-height: 100vh; display: flex; flex-direction: column; }
.screen { display: none; flex-direction: column; min-height: 100vh; width: 100%; max-width: 480px; margin: 0 auto; background: var(--white); position: relative; }
.screen.active { display: flex; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--white); border-bottom: 3px solid var(--blue-light); position: sticky; top: 0; z-index: 100; gap: 8px; }
.header-title { font-size: 18px; font-weight: 800; color: var(--blue); flex: 1; text-align: center; }
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 16px 28px; border-radius: var(--radius); font-size: 18px; font-weight: 800; transition: all .2s; width: 100%; gap: 8px; }
.btn-primary { background: var(--blue); color: var(--white); box-shadow: 0 4px 0 var(--blue-dark); }
.btn-primary:hover { transform: translateY(-1px); }
.btn-primary:active { transform: translateY(2px); box-shadow: none; }
.btn-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--blue-light); color: var(--blue); font-size: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.content { flex: 1; overflow-y: auto; padding: 20px; }
#screen-welcome { background: linear-gradient(160deg, #1A4A7A 0%, #3A6EA8 60%, #5A9EE8 100%); justify-content: center; align-items: center; text-align: center; padding: 40px 24px; }
.welcome-logo { font-size: 72px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.welcome-title { font-size: 28px; font-weight: 900; color: var(--white); text-shadow: 0 2px 8px rgba(0,0,0,.3); margin-bottom: 8px; line-height: 1.4; }
.welcome-sub { font-size: 16px; color: rgba(255,255,255,.9); margin-bottom: 40px; font-weight: 700; }
.welcome-form { width: 100%; max-width: 340px; }
.welcome-input { width: 100%; padding: 16px 20px; border-radius: var(--radius); border: 2px solid transparent; font-size: 18px; text-align: center; background: rgba(255,255,255,.95); margin-bottom: 16px; outline: none; font-weight: 600; }
.welcome-input:focus { border-color: var(--orange); }
#screen-home .home-header { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); color: var(--white); padding: 20px 16px 28px; }
.home-greeting { font-size: 15px; opacity: .85; font-weight: 700; }
.home-name { font-size: 28px; font-weight: 900; margin-top: 4px; }
.area-card { margin: 0 0 16px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform .2s, box-shadow .2s; position: relative; border: 3px solid transparent; }
.area-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.15); border-color: rgba(255,255,255,.5); }
.area-card.locked { opacity: .6; cursor: not-allowed; }
.area-header { padding: 20px; display: flex; align-items: center; gap: 16px; }
.area-emoji { font-size: 44px; flex-shrink: 0; }
.area-info { flex: 1; }
.area-name { font-size: 20px; font-weight: 900; color: var(--white); }
.area-sub { font-size: 14px; color: rgba(255,255,255,.85); margin-top: 4px; font-weight: 700; }
.area-stars { padding: 12px 20px; background: rgba(255,255,255,.15); }
.star-wrap { display: flex; gap: 8px; flex-wrap: wrap; }
.ep-pip { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; }
.ep-pip.done { background: var(--orange); color: var(--white); }
.ep-pip.open { background: rgba(255,255,255,.3); color: var(--white); }
.ep-card { margin-bottom: 16px; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: transform .2s; border: 3px solid transparent; background: var(--white); }
.ep-card:hover:not(.locked) { transform: translateY(-2px); border-color: var(--blue); }
.ep-card.locked { opacity: .5; cursor: not-allowed; }
.ep-card-inner { display: flex; align-items: center; gap: 16px; padding: 18px 20px; }
.ep-num { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 900; color: var(--white); flex-shrink: 0; }
.ep-card-info { flex: 1; }
.ep-card-title { font-size: 18px; font-weight: 800; }
.ep-card-ruby { font-size: 12px; color: var(--gray-3); margin-top: 2px; }
.ep-badge { font-size: 13px; font-weight: 800; padding: 6px 12px; border-radius: 20px; flex-shrink: 0; background: var(--blue-light); color: var(--blue); }
.ep-badge.done { background: #E8F5E9; color: #4CAF50; }
.story-page { min-height: 100%; display: flex; flex-direction: column; background: #FDF6E3; }
.story-illustration { width: 100%; aspect-ratio: 16/9; background: var(--blue-light); display: flex; align-items: center; justify-content: center; font-size: 80px; flex-shrink: 0; }
.story-text-wrap { flex: 1; padding: 24px; font-size: 20px; line-height: 2.0; font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif; font-weight: 500; }
.ruby { font-size: 11px; display: ruby; }
.kanji-tap { color: var(--blue); text-decoration: underline; text-decoration-style: dotted; cursor: pointer; font-weight: 800; padding: 2px 4px; border-radius: 4px; }
.kanji-tap:hover { background: rgba(58, 110, 168, 0.1); }
.story-nav { display: flex; gap: 12px; padding: 20px; background: var(--white); border-top: 2px solid var(--gray-2); }
.nav-btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; }
.nav-btn-back { background: var(--gray-1); color: var(--text); }
.nav-btn-complete { background: var(--blue); color: var(--white); }
.kanji-big { font-size: 84px; font-weight: 900; text-align: center; color: var(--blue-dark); line-height: 1; margin-bottom: 8px; }
.kanji-reading { text-align: center; font-size: 22px; color: var(--gray-3); margin-bottom: 20px; font-weight: 700; }
.kanji-examples { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.kanji-ex-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--gray-1); border-radius: 12px; }
.kanji-ex-emoji { font-size: 28px; flex-shrink: 0; }
.kanji-ex-text { font-size: 18px; font-weight: 800; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: none; }
.btn-icon.invisible { visibility: hidden; }
</style>
</head>
<body>
<div id="app">
  <div id="screen-welcome" class="screen active">
    <div style="width:100%; max-width:360px;">
      <div class="welcome-logo">📖</div>
      <h1 class="welcome-title">ものがたり漢字<br>アドベンチャー</h1>
      <p class="welcome-sub">漢字の世界へようこそ！</p>
      <div class="welcome-form">
        <input type="text" id="playerName" class="welcome-input" placeholder="お名前を入力してください" maxlength="10">
        <button class="btn btn-primary" onclick="startGame()" style="font-size:20px; padding:18px;">冒険開始</button>
      </div>
    </div>
  </div>

  <div id="screen-home" class="screen">
    <div class="home-header">
      <div class="home-greeting">いらっしゃいませ！</div>
      <div class="home-name" id="homePlayerName">冒険者</div>
    </div>
    <div class="content">
      <div style="font-size:15px; font-weight:800; color:var(--gray-3); text-transform:uppercase; letter-spacing:.5px; padding:16px 0 12px; text-align:center;">📍 地域を選ぶ</div>
      <div id="areasContainer"></div>
    </div>
  </div>

  <div id="screen-episodes" class="screen">
    <div class="header">
      <button class="btn-icon" onclick="backScreen()">◀</button>
      <div class="header-title" id="epAreaName">エピソード</div>
      <div class="btn-icon invisible">✕</div>
    </div>
    <div class="content" id="episodesContainer"></div>
  </div>

  <div id="screen-story" class="screen">
    <div class="header">
      <button class="btn-icon" onclick="backScreen()">◀</button>
      <div class="header-title" id="storyTitle">ストーリー</div>
      <div class="btn-icon invisible">✕</div>
    </div>
    <div class="story-page" id="storyPage"></div>
  </div>

  <div id="screen-kanji" class="screen">
    <div class="header">
      <button class="btn-icon" onclick="backScreen()">◀</button>
      <div class="header-title">漢字を学ぼう</div>
      <div class="btn-icon invisible">✕</div>
    </div>
    <div class="content">
      <div style="margin-top:28px;">
        <div class="kanji-big" id="kanjiDisplay">字</div>
        <div class="kanji-reading" id="kanjiReading">よみ</div>
        <div class="kanji-examples" id="kanjiExamples"></div>
        <button class="btn btn-primary" onclick="backScreen()" style="margin-top:20px;">もどる</button>
      </div>
    </div>
  </div>
</div>

<script>
const AREAS = [
  { id: 'machi', name: '街', ruby: 'まち', emoji: '🏘️', color: '#2C6FBF' },
  { id: 'koujou', name: '工場', ruby: 'こうじょう', emoji: '🏭', color: '#2E7D32' },
  { id: 'tegami', name: '手紙', ruby: 'てがみ', emoji: '💌', color: '#7B1FA2' }
];

const EPISODES = [
  { id: 'machi-ep1', area: 'machi', num: 1, title: '街の出会い', ruby: 'まちのであい', kanji: ['街','道'] },
  { id: 'machi-ep2', area: 'machi', num: 2, title: '商人との話', ruby: 'しょうにんとのはなし', kanji: ['街','家'] },
  { id: 'machi-ep3', area: 'machi', num: 3, title: '祭りの日', ruby: 'まつりのひ', kanji: ['街','道'] },
  { id: 'koujou-ep1', area: 'koujou', num: 1, title: '工場見学', ruby: 'こうじょうけんがく', kanji: ['工','場'] },
  { id: 'koujou-ep2', area: 'koujou', num: 2, title: '職人の技', ruby: 'しょくにんのわざ', kanji: ['工','作'] },
  { id: 'koujou-ep3', area: 'koujou', num: 3, title: '完成', ruby: 'かんせい', kanji: ['場','作'] },
  { id: 'tegami-ep1', area: 'tegami', num: 1, title: '手紙が届く', ruby: 'てがみがとどく', kanji: ['手','紙'] },
  { id: 'tegami-ep2', area: 'tegami', num: 2, title: '返事を書く', ruby: 'へんじをかく', kanji: ['手','文'] },
  { id: 'tegami-ep3', area: 'tegami', num: 3, title: '絆', ruby: 'きずな', kanji: ['手','紙','文'] }
];

const KANJI_DB = {
  '街': { reading: 'がい', ruby: 'がい', examples: ['街道（かいどう）', '街中（まちなか）'] },
  '道': { reading: 'どう', ruby: 'どう', examples: ['道路（どうろ）', '茶道（ちゃどう）'] },
  '家': { reading: 'か', ruby: 'か', examples: ['家族（かぞく）', '民家（みんか）'] },
  '工': { reading: 'こう', ruby: 'こう', examples: ['工事（こうじ）', '工場（こうじょう）'] },
  '場': { reading: 'ば', ruby: 'ば', examples: ['工場（こうじょう）', '広場（ひろば）'] },
  '作': { reading: 'さく', ruby: 'さく', examples: ['作業（さぎょう）', '作る（つくる）'] },
  '手': { reading: 'て', ruby: 'て', examples: ['手紙（てがみ）', '握手（あくしゅ）'] },
  '紙': { reading: 'かみ', ruby: 'かみ', examples: ['紙質（ししつ）', '和紙（わし）'] },
  '文': { reading: 'ぶん', ruby: 'ぶん', examples: ['文字（もじ）', '論文（ろんぶん）'] }
};

let state = { screen: 'welcome', playerName: '', currentArea: null, currentEpisode: null, completedEpisodes: [] };

function startGame() {
  const name = document.getElementById('playerName').value.trim() || '冒険者';
  state.playerName = name;
  localStorage.setItem('kanji-state', JSON.stringify(state));
  showScreen('home');
  renderHome();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  state.screen = name;
}

function renderHome() {
  document.getElementById('homePlayerName').textContent = state.playerName;
  const html = AREAS.map(area => `
    <div class="area-card" style="background: linear-gradient(135deg, ${area.color}, ${area.color}dd)" onclick="selectArea('${area.id}')">
      <div class="area-header">
        <div class="area-emoji">${area.emoji}</div>
        <div class="area-info">
          <div class="area-name">${area.name}</div>
          <div style="font-size:13px; color:rgba(255,255,255,.7);">ふりがな：${area.ruby}</div>
          <div class="area-sub" style="margin-top:6px;">3つのお話</div>
        </div>
      </div>
      <div class="area-stars">
        <div class="star-wrap">
          ${EPISODES.filter(e => e.area === area.id).map((e, i) => `
            <div class="ep-pip ${state.completedEpisodes.includes(e.id) ? 'done' : 'open'}">${i+1}</div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('areasContainer').innerHTML = html;
}

function selectArea(areaId) {
  state.currentArea = areaId;
  const area = AREAS.find(a => a.id === areaId);
  document.getElementById('epAreaName').textContent = area.name + '（' + area.ruby + '）';
  showScreen('episodes');
  renderEpisodes();
}

function renderEpisodes() {
  const episodes = EPISODES.filter(e => e.area === state.currentArea);
  const html = episodes.map(ep => `
    <div class="ep-card ${state.completedEpisodes.includes(ep.id) ? 'done' : ''}" onclick="selectEpisode('${ep.id}')">
      <div class="ep-card-inner">
        <div class="ep-num" style="background:${AREAS.find(a => a.id === ep.area).color}">${ep.num}</div>
        <div class="ep-card-info">
          <div class="ep-card-title">${ep.title}</div>
          <div class="ep-card-ruby">ふりがな：${ep.ruby}</div>
        </div>
        <div class="ep-badge ${state.completedEpisodes.includes(ep.id) ? 'done' : ''}">${state.completedEpisodes.includes(ep.id) ? '完了' : '開始'}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('episodesContainer').innerHTML = html;
}

function selectEpisode(epId) {
  state.currentEpisode = epId;
  const ep = EPISODES.find(e => e.id === epId);
  document.getElementById('storyTitle').textContent = ep.title;
  
  const story = 'さあ、「' + ep.title + '」の冒険がはじまります。\n\nした漢字をタップすると、くわしく学べます。';
  
  document.getElementById('storyPage').innerHTML = `
    <div class="story-illustration">📖</div>
    <div class="story-text-wrap">
      ${story.split('\n').map(line => `<p style="margin-bottom:16px;">${line}</p>`).join('')}
      <p style="margin-top:24px; font-size:18px;">
        ${ep.kanji.map(k => `<span class="kanji-tap" onclick="showKanjiDetail('${k}')">${k}</span>`).join('　')}
      </p>
    </div>
    <div class="story-nav">
      <button class="nav-btn nav-btn-back" onclick="backScreen()">◀ もどる</button>
      <button class="nav-btn nav-btn-complete" onclick="completeEpisode('${epId}')">完了 ✓</button>
    </div>
  `;
  showScreen('story');
}

function completeEpisode(epId) {
  if (!state.completedEpisodes.includes(epId)) {
    state.completedEpisodes.push(epId);
    localStorage.setItem('kanji-state', JSON.stringify(state));
  }
  backScreen();
}

function showKanjiDetail(kanji) {
  const entry = KANJI_DB[kanji];
  if (!entry) return;
  document.getElementById('kanjiDisplay').textContent = kanji;
  document.getElementById('kanjiReading').textContent = '読み方：' + entry.ruby;
  document.getElementById('kanjiExamples').innerHTML = entry.examples.map(ex => `
    <div class="kanji-ex-row">
      <div class="kanji-ex-emoji">📖</div>
      <div class="kanji-ex-text">${ex}</div>
    </div>
  `).join('');
  showScreen('kanji');
}

function backScreen() {
  if (state.screen === 'kanji' || state.screen === 'story') showScreen('episodes');
  else if (state.screen === 'episodes') showScreen('home');
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('kanji-state');
  if (saved) {
    state = JSON.parse(saved);
    showScreen('home');
    renderHome();
  }
});
</script>
</body>
</html>
