<script>
const KANJI_DB = {
  'machi': [
    { kanji: '街', reading: 'まち', examples: ['街道', '商街', '通り'] },
    { kanji: '道', reading: 'どう', examples: ['道路', '茶道', '武道'] },
    { kanji: '家', reading: 'いえ', examples: ['家族', '民家', 'うち'] }
  ],
  'koujou': [
    { kanji: '工', reading: 'こう', examples: ['工事', '工場', '木工'] },
    { kanji: '場', reading: 'ば', examples: ['工場', '駅', '広場'] },
    { kanji: '作', reading: 'さく', examples: ['作業', '創作', '作る'] }
  ],
  'tegami': [
    { kanji: '手', reading: 'て', examples: ['手紙', '握手', '手段'] },
    { kanji: '紙', reading: 'かみ', examples: ['紙質', '新聞紙', '和紙'] },
    { kanji: '文', reading: 'ぶん', examples: ['文字', '論文', 'テキスト'] }
  ]
};

const EPISODES = [
  { id: 'machi-ep1', area: 'machi', num: 1, title: '街の出会い', kanji: ['街','道'] },
  { id: 'machi-ep2', area: 'machi', num: 2, title: '商人との話', kanji: ['街','家'] },
  { id: 'machi-ep3', area: 'machi', num: 3, title: '祭りの日', kanji: ['街','道'] },
  { id: 'koujou-ep1', area: 'koujou', num: 1, title: '工場見学', kanji: ['工','場'] },
  { id: 'koujou-ep2', area: 'koujou', num: 2, title: '職人の技', kanji: ['工','作'] },
  { id: 'koujou-ep3', area: 'koujou', num: 3, title: '完成', kanji: ['場','作'] },
  { id: 'tegami-ep1', area: 'tegami', num: 1, title: '手紙が届く', kanji: ['手','紙'] },
  { id: 'tegami-ep2', area: 'tegami', num: 2, title: '返事を書く', kanji: ['手','文'] },
  { id: 'tegami-ep3', area: 'tegami', num: 3, title: '絆', kanji: ['手','紙','文'] }
];

const AREAS = [
  { id: 'machi', name: '街', emoji: '🏘️', color: '#2C6FBF' },
  { id: 'koujou', name: '工場', emoji: '🏭', color: '#2E7D32' },
  { id: 'tegami', name: '手紙', emoji: '💌', color: '#7B1FA2' }
];

let state = { screen: 'welcome', playerName: '', currentArea: null, currentEpisode: null, completedEpisodes: [] };

function startGame() {
  const name = document.getElementById('playerName').value.trim() || '冒険者';
  state.playerName = name;
  localStorage.setItem('kanji-state', JSON.stringify(state));
  showScreen('home');
  renderHome();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  state.screen = name;
}

function renderHome() {
  document.getElementById('homePlayerName').textContent = state.playerName;
  const html = AREAS.map(area => `
    <div class="area-card" style="background: linear-gradient(135deg, ${area.color}, ${area.color}dd)" onclick="selectArea('${area.id}')">
      <div class="area-header">
        <div class="area-emoji">${area.emoji}</div>
        <div class="area-info">
          <div class="area-name">${area.name}</div>
          <div class="area-sub">エピソード 3話</div>
        </div>
      </div>
      <div class="area-stars">
        <div class="star-wrap">
          ${EPISODES.filter(e => e.area === area.id).map((e, i) => `
            <div class="ep-pip ${state.completedEpisodes.includes(e.id) ? 'done' : 'open'}">${i+1}</div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById('areasContainer').innerHTML = html;
}

function selectArea(areaId) {
  state.currentArea = areaId;
  const area = AREAS.find(a => a.id === areaId);
  document.getElementById('epAreaName').textContent = area.name;
  showScreen('episodes');
  renderEpisodes();
}

function renderEpisodes() {
  const episodes = EPISODES.filter(e => e.area === state.currentArea);
  const html = episodes.map(ep => `
    <div class="ep-card ${state.completedEpisodes.includes(ep.id) ? 'done' : ''}" onclick="selectEpisode('${ep.id}')">
      <div class="ep-card-inner">
        <div class="ep-num" style="background:${AREAS.find(a => a.id === ep.area).color}">${ep.num}</div>
        <div class="ep-card-info">
          <div class="ep-card-title">${ep.title}</div>
          <div class="ep-card-meta">学習漢字: ${ep.kanji.join(', ')}</div>
        </div>
        <div class="ep-badge ${state.completedEpisodes.includes(ep.id) ? 'done' : 'open'}">${state.completedEpisodes.includes(ep.id) ? '完了' : '開始'}</div>
      </div>
    </div>
  `).join('');
  document.getElementById('episodesContainer').innerHTML = html;
}

function selectEpisode(epId) {
  state.currentEpisode = epId;
  const ep = EPISODES.find(e => e.id === epId);
  const story = ep.title + 'のストーリーが展開します。各漢字をタップして詳しく学びましょう。' + ep.kanji.map((k, i) => `${i+1}. ${k}`).join(' ');
  document.getElementById('storyTitle').textContent = ep.title;
  document.getElementById('storyPage').innerHTML = `
    <div class="story-illustration">📖</div>
    <div class="story-text-wrap">
      <p>${story}</p>
      ${ep.kanji.map(k => `<span class="kanji-tap" onclick="showKanjiDetail('${k}')">${k}</span>`).join(' ')}
    </div>
    <div class="story-nav">
      <button class="btn btn-primary" style="flex:1;" onclick="completeEpisode('${epId}')">完了</button>
    </div>
  `;
  showScreen('story');
}

function completeEpisode(epId) {
  if (!state.completedEpisodes.includes(epId)) {
    state.completedEpisodes.push(epId);
    localStorage.setItem('kanji-state', JSON.stringify(state));
  }
  backScreen();
}

function showKanjiDetail(kanji) {
  const db = Object.values(KANJI_DB).flat();
  const entry = db.find(e => e.kanji === kanji);
  if (!entry) return;
  document.getElementById('kanjiDisplay').textContent = entry.kanji;
  document.getElementById('kanjiReading').textContent = entry.reading;
  document.getElementById('kanjiExamples').innerHTML = entry.examples.map(ex => `
    <div class="kanji-ex-row">
      <div class="kanji-ex-emoji">✨</div>
      <div class="kanji-ex-text">${ex}</div>
    </div>
  `).join('');
  showScreen('kanji');
}

function backScreen() {
  if (state.screen === 'kanji' || state.screen === 'story') showScreen('episodes');
  else if (state.screen === 'episodes') showScreen('home');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('open');
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('kanji-state');
  if (saved) {
    state = JSON.parse(saved);
    showScreen('home');
    renderHome();
  }
});
</script>
</body>
</html>
