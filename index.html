<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ものがたり漢字アドベンチャー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Hiragino Kaku Gothic Pro', 'Meiryo', sans-serif; }
#app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f0f4f8; }
.container { text-align: center; padding: 40px 20px; }
h1 { font-size: 32px; color: #1a4a7a; margin-bottom: 20px; }
p { font-size: 18px; color: #666; margin-bottom: 30px; }
button { padding: 12px 24px; font-size: 16px; background: #3a6ea8; color: white; border: none; border-radius: 8px; cursor: pointer; }
button:hover { background: #1a4a7a; }
</style>
</head>
<body>
<div id="app">
  <div class="container">
    <h1>ものがたり漢字アドベンチャー</h1>
    <p>漢字の世界へようこそ！冒険を始めましょう。</p>
    <button onclick="alert('アプリ準備中...')">冒険開始</button>
  </div>
</div>
</body>
</html>
